# main ブランチへの push で GitHub Pages へ自動デプロイする
name: Deploy to GitHub Pages

on:
  # main に push されたら実行
  push:
    branches: [main]
  # 手動実行も可能にする（Actions タブの「Run workflow」）
  workflow_dispatch:

# GITHUB_TOKEN に Pages 公開用の権限を付与（個人トークン不要）
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に制限（連続 push 時に古いデプロイをキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 依存パッケージのインストール
        run: npm ci

      - name: ビルド
        run: npm run build

      - name: Pages 設定
        uses: actions/configure-pages@v5

      - name: 成果物（dist）をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pages へデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
